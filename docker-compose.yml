services:
  postgres:
    image: postgres:16.4-alpine
    container_name: pcparts-postgres
    environment:
      POSTGRES_USER: pcparts
      POSTGRES_PASSWORD: pcparts
      POSTGRES_DB: pcparts
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcparts -d pcparts"]
      interval: 5s
      timeout: 3s
      retries: 20

  metabase:
    image: metabase/metabase:v0.49.17
    container_name: pcparts-metabase
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: pcparts
      MB_DB_PASS: pcparts
      MB_DB_HOST: postgres
    volumes:
      - metabase-data:/metabase-data

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pcparts-scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TIMEZONE: America/Sao_Paulo
      REQUEST_DELAY_SECONDS: "2"
      REQUEST_TIMEOUT: "15"

      # Use this DSN by setting config.json: postgres.dsn_env = "PCPARTS_POSTGRES_DSN"
      PCPARTS_POSTGRES_DSN: postgresql://pcparts:pcparts@postgres:5432/pcparts

      # Use the default mount below (./src/credentials.json -> /app/src/credentials.json)
      GOOGLE_CREDENTIALS_FILE: /app/src/credentials.json
    volumes:
      - ./config.json:/app/config.json:ro
      - ./src/credentials.json:/app/src/credentials.json:ro
    # Run on demand: `docker compose --profile scrape run --rm scraper [--dry-run]`
    profiles: ["scrape"]
    command: ["python", "-m", "src.agent"]

volumes:
  pgdata:
  metabase-data:

